<!DOCTYPE html>
<html>
<head>
    <title>Review</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h1>Review</h1>

    {% if card %}
        <div class="card p-4 mb-3" style="max-width: 600px;">
            <h3 class="card-title">{{ card.front }}</h3>

            {% if show_answer %}
                <hr>
                <p class="card-text fs-5">{{ card.back }}</p>
                <form method="POST" action="/review/answer" class="d-flex gap-2 mt-3">
                    <input type="hidden" name="card_id" value="{{ card.id }}">
                    <button type="submit" name="score" value="1" class="btn btn-danger">Again</button>
                    <button type="submit" name="score" value="3" class="btn btn-warning">Hard</button>
                    <button type="submit" name="score" value="5" class="btn btn-success">Easy</button>
                </form>
            {% else %}
                <form method="POST" action="/review/show-answer" class="mt-3">
                    <input type="hidden" name="card_id" value="{{ card.id }}">
                    <button type="submit" class="btn btn-primary">Show Answer</button>
                </form>
            {% endif %}
        </div>

    {% else %}
        <div class="alert alert-success">
            No cards due today — you're all caught up!
        </div>
    {% endif %}

    <a href="/" class="btn btn-secondary">Home</a>

</div>
</body>
</html>
