<!DOCTYPE html>
<html>
<head>
    <title>{{concept.name}}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h1>{{concept.name}}</h1>

    <h2>Flashcards</h2>
    <ul class="list-group mb-3">
        {% for card in flashcards %}
            <li class="list-group-item">
                <strong>Q:</strong> {{card.front}} <br>
                <small class="text-muted">Next review: {{ card.next_review }}</small>
            </li>
        {% endfor %}
    </ul>

    <h2>Add Flashcard</h2>
    <form method="POST" action="/concept/{{concept.id}}/add-flashcard" class="d-flex gap-2">
        <input type="text" name="front" placeholder="Front (question)" class="form-control">
        <input type="text" name="back" placeholder="Back (answer)" class="form-control">
        <button type="submit" class="btn btn-success">Add</button>
    </form>

    <a href="/subject/{{concept.subject_id}}" class="btn btn-secondary mt-3">Back</a>

</div>
</body>
</html>
