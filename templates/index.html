<!DOCTYPE html>
<html>
<head>
    <title>Kioku</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">

    <h1>Kioku(記憶)</h1>
    <a href="/review" class="btn btn-primary mb-3">
    Start Review 
    {% if due_count > 0 %}
        <span class="badge bg-danger">{{ due_count }}</span>
    {% endif %}
    </a>

    <h2>Subjects</h2>
    <ul class="list-group mb-3">
        {% for subject in subjects %}
            <li class="list-group-item">
                <a href="/subject/{{ subject.id }}">{{ subject.name }}</a>
            </li>
        {% endfor %}
    </ul>

    <h2>Add Subject</h2>
    <form method="POST" action="/add-subject" class="d-flex gap-2">
        <input type="text" name="name" placeholder="Subject name" class="form-control w-25">
        <button type="submit" class="btn btn-success">Add</button>
    </form>

</div>
</body>
</html>
