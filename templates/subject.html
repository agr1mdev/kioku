<!DOCTYPE html>
<html>
<head>
    <title>{{subject.name}}</title>
</head>
<body>
    <h1>{{subject.name}}</h1>

    <h2>Concepts</h2>
    <ul>
        {% for concept in concepts %}
            <li><a href="/concept/{{ concept.id }}">{{ concept.name }}</a></li>
        {% endfor %}
    </ul>


    <h2>Add Concept</h2>
    <form method="POST" action="/subject/{{subject.id}}/add-concept">
        <input type="text" name="name" placeholder="Concept name">
        <button type = "submit">Add</button>
    </form>

    <a href="/">Back</a>
</body>
</html>
