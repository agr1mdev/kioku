<!DOCTYPE html>
<html>
<head>
    <title>{{ subject.name }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
    .dot {
        position: absolute;
        width: 10px;
        height: 10px;
        background: rgba(255,255,255,0.4);
        border-radius: 50%;
        cursor: crosshair;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .concept-node:hover .dot { opacity: 1; }
    .dot-left   { top: 50%; left: -4px;  transform: translateY(-50%); }
    .dot-right  { top: 50%; right: -4px; transform: translateY(-50%); }
    .dot-top    { left: 50%; top: -4px;  transform: translateX(-50%); }
    .dot-bottom { left: 50%; bottom: -4px; transform: translateX(-50%); }

    .delete-connection {
        cursor: pointer;
        color: #dc3545;
        font-size: 12px;
        font-weight: bold;
        background: white;
        border-radius: 50%;
        padding: 2px 5px;
        opacity: 0;
        transition: opacity 0.2s;
    }
    .delete-connection:hover {
        opacity: 1;
    }
    </style>
</head>
<body>
<div class="container mt-4">

    <h1>{{ subject.name }}</h1>

    <div id="canvas" style="position: relative; width: 100%; height: 500px; border: 1px solid #ccc; margin-bottom: 20px;">
        {% for concept in concepts %}
            <div id="concept-{{ concept.id }}"
                class="concept-node"
                style="position: absolute; left: {{ concept.x or loop.index * 120 }}px; top: {{ concept.y or 50 }}px; padding: 10px 16px; background: {% if concept.at_risk %}#dc3545{% else %}#0d6efd{% endif %}; color: white; border-radius: 8px; cursor: move; min-width: 120px; text-align: center;">
                {{ concept.name }}
                {% if concept.at_risk %}
                    <br><small style="font-size: 10px;">⚠ at risk</small>
                {% endif %}
                <div class="connect-btn dot dot-left"></div>
                <div class="connect-btn dot dot-right"></div>
                <div class="connect-btn dot dot-top"></div>
                <div class="connect-btn dot dot-bottom"></div>
            </div>
        {% endfor %}
    </div>

    <h2>Concepts</h2>
    <ul class="list-group mb-3">
        {% for concept in concepts %}
            <li class="list-group-item">
                <a href="/concept/{{ concept.id }}">{{ concept.name }}</a>
            </li>
        {% endfor %}
    </ul>

    <h2>Add Concept</h2>
    <form method="POST" action="/subject/{{ subject.id }}/add-concept" class="d-flex gap-2">
        <input type="text" name="name" placeholder="Concept name" class="form-control w-25">
        <button type="submit" class="btn btn-success">Add</button>
    </form>

    <a href="/" class="btn btn-secondary mt-3">Back</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsplumb@2.15.6/dist/js/jsplumb.min.js"></script>
<script>
jsPlumb.ready(function() {
    jsPlumb.setContainer("canvas");

    let isLoading = true;

    jsPlumb.importDefaults({
        ConnectionOverlays: [
            ["Arrow", { location: 1, width: 12, length: 12, id: "arrow" }],
            ["Label", {
                label: "✕",
                id: "delete-label",
                cssClass: "delete-connection",
                location: 0.5
            }]
        ],
        HoverPaintStyle: { stroke: "#0a58ca", strokeWidth: 4 }
    });

    {% for concept in concepts %}
    jsPlumb.draggable("concept-{{ concept.id }}", {
        containment: "canvas",
        stop: function(event) {
            let el = event.el;
            fetch("/save-position", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: "{{ concept.id }}",
                    x: el.offsetLeft,
                    y: el.offsetTop
                })
            });
        }
    });

    jsPlumb.makeSource("concept-{{ concept.id }}", {
        filter: ".connect-btn",
        anchor: "Continuous",
        connector: ["StateMachine"],
        connectorStyle: { stroke: "#0d6efd", strokeWidth: 3 },
        connectorHoverStyle: { stroke: "#0a58ca" },
        endpoint: "Blank"
    });

    jsPlumb.makeTarget("concept-{{ concept.id }}", {
        anchor: "Continuous",
        allowLoopback: false,
        endpoint: "Blank",
        beforeDrop: function(params) {
            if (params.sourceId === params.targetId) return false;
            let existingConnections = jsPlumb.getConnections({
                source: params.sourceId,
                target: params.targetId
            });
            return existingConnections.length === 0;
        }
    });
    {% endfor %}

    jsPlumb.bind("connection", function(info) {
        if (isLoading) return;
        let sourceId = info.sourceId.replace("concept-", "");
        let targetId = info.targetId.replace("concept-", "");
        fetch("/add-dependency", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ source: sourceId, target: targetId })
        });
    });

    {% for dep in dependencies %}
    jsPlumb.connect({
        source: "concept-{{ dep.source_id }}",
        target: "concept-{{ dep.target_id }}",
        connector: ["StateMachine"],
        anchors: ["Continuous", "Continuous"],
        paintStyle: { stroke: "#0d6efd", strokeWidth: 3 },
        endpoint: "Blank"
    });
    {% endfor %}

    isLoading = false;

    document.addEventListener("click", function(e) {
        if (e.target.classList.contains("delete-connection")) {
            if (confirm("Remove this connection?")) {
                let connections = jsPlumb.getAllConnections();
                connections.forEach(function(conn) {
                    let label = conn.getOverlay("delete-label");
                    if (label && label.canvas === e.target) {
                        let sourceId = conn.sourceId.replace("concept-", "");
                        let targetId = conn.targetId.replace("concept-", "");
                        fetch("/delete-dependency", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ source: sourceId, target: targetId })
                        }).then(() => {
                            jsPlumb.deleteConnection(conn);
                        });
                    }
                });
            }
        }
    });

});
</script>

</body>
</html>
